<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trailhead — trip board</title>
  <meta name="description" content="Plan road trips, beach days, camping, hikes, and events with your crew." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=DM+Sans:ital,opsz,wght@0,9..40,400..600;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/base.css" />
</head>
<body>

  <p class="warning-banner">
    Anyone with this link can view and edit everything. Don't put home addresses, phone numbers, or payment details in here.
  </p>

  <header class="topbar">
    <a class="topbar__brand" href="index.html">Trailhead</a>
    <div class="topbar__actions">
      <button class="btn btn--solid" id="newTripBtn" type="button">New trip</button>
    </div>
  </header>

  <main class="wrap">
    <form class="panel" id="newTripForm" hidden>
      <h2>New trip</h2>
      <div class="form-row">
        <label class="field">Title
          <input name="title" placeholder="Route 62 drive" required maxlength="80" />
        </label>
        <label class="field">Category
          <select name="category" id="newTripCategory" required></select>
        </label>
        <label class="field">Date
          <input name="date" type="date" />
        </label>
        <button class="btn btn--solid" type="submit">Create</button>
      </div>
    </form>

    <section>
      <h2 class="board__section-title">Upcoming adventures</h2>
      <div class="board__grid" id="upcomingGrid"></div>
    </section>

    <section>
      <details id="pastSection">
        <summary class="board__section-title" style="cursor:pointer; display:list-item;">Past adventures</summary>
        <div class="board__grid" id="pastGrid"></div>
      </details>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/db.js"></script>
  <script src="js/map.js"></script>
  <script src="js/board.js"></script>
</body>
</html>
